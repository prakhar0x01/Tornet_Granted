<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="dark" />
  <meta name="description" content="TORNET GRANTED — Dark Web Intelligence & Onion Reconnaissance Platform." />
  <title>{% block title %}TORNET GRANTED — Intelligence Console{% endblock %}</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="{{ url_for('static', filename='css/tokens.css') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/components.css') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}" />

  {% block head %}{% endblock %}
</head>
<body class="{% block body_class %}{% endblock %}">
{% block layout %}
  <div class="app">
    {% include "partials/_sidebar.html" %}
    {% include "partials/_topbar.html" %}
    <main class="main">
      {% block content %}{% endblock %}
    </main>
  </div>
{% endblock %}

  <div class="toast-region" aria-live="polite" aria-atomic="true"></div>

  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
